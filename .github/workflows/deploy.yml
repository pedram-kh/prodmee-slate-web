name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  SPA_BUCKET: ${{ vars.SPA_BUCKET }}                       # e.g. prodmee-slate-web
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_API_BASE: ${{ vars.VITE_API_BASE }}                 # e.g. https://api.slate.prodmee.app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Long-cache hashed assets, no-cache the HTML entrypoint.
          aws s3 sync dist/ "s3://$SPA_BUCKET/" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html
          aws s3 cp dist/index.html "s3://$SPA_BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/index.html" "/"
